apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: taskflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: taskflow-config
                  key: SPRING_RABBITMQ_HOST
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 25
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 384Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: taskflow
spec:
  selector:
    app: notification-service
  ports:
    - port: 8081
      targetPort: 8081
